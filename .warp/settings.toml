[appearance]

[appearance.themes]
system_theme = false
theme = {
  custom_base_16 = {
    name = "Base16 Atelier Lakeside",
    path = "/Users/fldietrich/.warp/themes/base16_atelier_lakeside.yaml",
  },
}

[appearance.vertical_tabs]
enabled = true

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0
font_name = "MonoLisa"
ai_font_name = "MonoLisa"
match_ai_font = false

[appearance.icon]
app_icon = "classic_1"

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true
open_file_editor = { external_editor = "zed" }

[warp_drive]
enabled = true

[agents]

[agents.warp_agent]
is_any_ai_enabled = false

[agents.warp_agent.input]
nld_in_terminal_enabled = true
ai_auto_detection_enabled = true

[agents.warp_agent.active_ai]
enabled = true
agent_mode_query_suggestions_enabled = false

[agents.warp_agent.other]
show_agent_notifications = false

[accessibility]
accessibility_verbosity = "concise"

[code]

[code.editor]
show_global_search = true
show_project_explorer = true
show_code_review_button = true
open_code_panels_file_editor = "warp"

[code.indexing]
agent_mode_codebase_context_auto_indexing = true

[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "enabled"
play_notification_sound = true

[text_editing]
vim_mode_enabled = true

[general]
show_warning_before_quitting = false
