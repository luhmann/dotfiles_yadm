[appearance]

[appearance.themes]
system_theme = false
theme = {
  custom_base_16 = {
    name = "Base16 Atelier Lakeside",
    path = "/Users/fldietrich/.warp/themes/base16_atelier_lakeside.yaml",
  },
}

[appearance.vertical_tabs]
enabled = true

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0
font_name = "MonoLisa"
ai_font_name = "MonoLisa"
match_ai_font = false

[appearance.icon]
app_icon = "classic_1"

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true
open_file_editor = { external_editor = "zed" }

[warp_drive]
enabled = true

[agents]

[agents.third_party]
should_render_cli_agent_toolbar = true

[agents.warp_agent]
is_any_ai_enabled = false

[agents.warp_agent.other]
show_agent_notifications = true
